body:
  text: 失譯人名今附秦録歸命一切智我從此語如是是人臨欲死時成無記心其以何業往生答曰有業記心惑業往惡道無惑記心白業往善道體性記心以是故隨行以無記心起無記業為業制故往生如是是故行無隔若眠若悶若無心死行制故往業道此二段語顯相應第三段語顯不失彼業自作自業自作者何義答受義故自業者何義答分義何以故不往他故是生何以故方便故是行處何以故由彼故是不滅何以故受故此顯現故此世作業不滅故由報業受生四處此欲界死欲界生有處往中間有處受中間有如是若欲界處若色界處第一處第三處異生可説如是從欲界中間有受欲界中間有從欲界中間有受色界中間有如是此欲界死受生中間有如是如是第三處從色界中間有受色界中間有如此我等死受中間有如是云何世尊聲聞從中間有受中間有非凡夫云何爾須陀洹從此七生七死受天中間有住彼作斯陀含果證是其從天中間有受人中間有住此作厭欲界證是其從人中間有受色界中間有是其住彼中間般涅槃地作向一從彼入別中間有於此處而般涅槃如是聲聞過四中間有有諸部説家已斯陀含斯陀含人中間有處至一間地處度人中間有如是如是從欲天受欲天如是可知有人捨五陰生有處受五陰中間有處如是一切我從此語今當説云何有我我捨此有受彼有若為問曰何所疑答曰見先師意互相違故生疑有諸部説實無我唯陰處是我何以故苦起而已故世尊語迦栴延唯苦生生唯苦滅滅彼但見苦起而已故知諸部見無有我如是復次何義説言無我答無説故世尊又語先尼梵志如師所見法諦實説無我世尊言如是見者是名為師是名為多他阿伽度阿羅訶三藐三佛陀是我所説彼諸部見無説故是故無我如是復次何義説無我答自見其身故世尊説言無聞無知凡夫見色是我我亦是色色在我中我在色中如是四種四陰亦如是若有我者不應自捨其身見五陰是其體譬如有人自捨其身取提婆達多身見為其身見其身是提婆達多其身中有提婆達多提婆達多中有其身如捨其眼根取提婆達多眼見象牙見為其知見而非其見是故無我如是復次何義説言無我答我我所不可得故世尊告諸比丘若有我者即有我所若有我所即有我我及我所諦實不可得是故無我彼諸部見我我所不可得故是故無我如是復次何以故説無我答不實言有故如富樓那語諸比丘長老佛所説法甚為難測於無物中有我佛自言我亦有如是長老我但知此語不測深旨如是不實言有故知諸部見不實義故是故無我如是又諸部説不可言有我不可言無我何以故答我相不可言故答有我者可説如行行相可説如無為無為相可説如是我我相可説彼諸部見我相不可説故是故有我無我不可説如是復次何以故有我無我不可説答直置問記故何以故問記有四種一者一問直記二者先詰然後記三者反問而記四者直置不記今者問我直置不記是故不可言有我不可言無我如是復次何以故有我無我不可説答定異合故若有我便應可説為是行為異行為是無為異無為此二種説既不定是故不可言有我不可言無我如是復次何以故有我無我不可説答常無常合故若有我可説為是常為無常此二種説應必有定而不定是故不可説言有我不可説言無我如是復次何以故有我無我不可説答有無中依止故佛告迦栴延世間依二種亦依有亦依無以是故執有執無是故有我無我不可説如是又諸部説實有我何以故語縛故佛言是色痛想行識繫縛從此世渡彼彼諸部見繫説縛故是故有我如是復次何以故有我答正見故佛言有人見化生故正見彼諸部見正見故是故有我如是復次何以故有我答佛説四念故佛言觀見身受心法若無我無可見四法彼諸部見佛説四念故是故有我如是復次何以故有我答佛説聲聞故佛言有人事火自炙其身勸人自炙以是故佛説有人如是若無人自無炙亦無他可炙彼諸部見佛説有人是故見有我如是復次諸部何故説有我答一人出世多人得安樂生故佛語諸比丘一切功德人生在世間多人得安樂故若無人誰生功德是諸部見一人生故是故有我如是又諸部説五陰是人是我問曰何以故答説界門故佛語比丘六界門六觸是人彼諸部見佛説六界門六觸是人是故是人如是復次何以故是人無異人答佛説外國有最上女人修多羅等故佛言我所説是最上女人若白若黑若青若細滑若方若長若短若細腰若肥即是人更無異人如是又佛語比丘有人見一比丘可憎若短若瘻若躍如是復次佛説我天眼見衆生可愛可憎等如是復次説彼地獄人如燒積薪燒地獄人亦復如是前所説最上女人等及見比丘可憎佛見衆生可愛可憎乃至燒地獄人如燒積薪等但是五陰是人更無異人是諸部見佛説陰是人是故是人如是又諸部説人異五陰何以故答如擔重擔人故佛言重擔是五陰擔者是人如是以是故人與陰各是故人與陰異如是復次何以故人異陰佛言人取愛為其第二久遠輪轉是故人與愛異以是故人與陰各如是復次何以故人與陰各答受業果故佛説偈言生世樂歡喜異世樂欣然作福二處歡自見其業淨此世業報竟來世復應受陰壞隨業往更受異陰身彼諸部見受業報故是故人與陰各如是復次何以故人與陰各答是我説故佛言我前世時作轉輪聖王名曰善見亦名大天以是故今受新陰前我不異是故人與陰各如是復次何以故人與陰各答無記處説故佛言陰無常不説人無常有時説陰是無常相有時説陰是常相以是故常相異無常相異是故人與陰各如是又諸部説人是常何以故答無本故人不應生死中行如佛所説生死無本衆生輪轉生死源本不可知如是是故人無本若人無本亦無其末是故人常如是復次何以故人常答憶過去世故佛言憶一生乃至憶過去無數劫生陰壞雖流轉生死而人不壞彼諸部見憶一生乃至憶過去無數劫生故是故人常如是復次何以故人常答説處故佛言渡彼岸住彼地名婆羅門如是佛復言既已渡彼岸更不復還如是佛復説渡彼岸者住彼處不墮落既至彼岸無復憂惱如是若人見渡彼岸者住彼處不墮落無憂惱故是故人常彼諸部見佛説處故是故人常復次何以故人常答至不動樂故佛説偈言如是正解脫渡欲淤泥流智者莫能測得至無動樂彼諸部見佛説至無動樂故是故人常以是人至不動樂無陰故是人不可知處是故人常如是又諸部説人無常問何以故答有本故佛語比丘有一人生為一切人安樂如是若有生有其本若有本有其末是故人無常如是復次何以故人無常答佛説語新故佛言新生天好顏色端正威德新者無常法名新是故人無常如是復次何以故人無常答倒法故佛言波斯匿王雖為人王異世時倒如是若有倒法成無常是故人無常復次何以故人無常答落生故涅槃常不落不生依佛説言我見衆生落生以是故依佛説落生是故人無常復次何以故人無常答生老病死法故佛言我是無數四部衆善知識以生死故來至我所得脫生死生老病死是無常法是故人無常如是是故從此修多羅以為本有説無實我如是有言不可説有我如是有説有我如是是故我等生疑雖然為當實有我為假設而已以是故有説五陰是我有説我異五陰有説常有説無常如是是故我等生疑問曰云何人捨此有更受異有答如修多羅意教化力可知五盛陰成人以為實人以五盛陰成人以為實人故不可言人常無常如是難曰前章所説無我為首各有所執云何解釋令得開解答如前所説苦起而已無我如是我等今説苦者苦生滅是苦性佛欲顯示苦性語迦旃延言苦生生苦滅滅我相生滅不可言是故佛説如是復次如前所説無説故無我如是我等今説我等相從信受如佛為外道説雖有我是假名我不實説我依有漏陰佛見去來法説是我非實我如佛説依行行故受名是故佛説説名我如是復次如前所説自見其身故無我如是我等今説答曰無明所覆五陰無我謂為我如新生無知小兒見餘母人謂為其母五陰無我謂為我亦復如是是佛所説如是復次如前所説無我我我所不可得故如是我等今説答曰佛説依不自在我我所實性不可得如是為他所制者不名自制若自制者不名他制是故斷自他制不斷我如是復次如前所説不實言有故無我如是我等今説答不實有故不實與無法共合無而言有此言難信是故斷無言有不斷我如是如諸部前所説相不可説故不可説有我無我如是我等今説曰我常無常相等不可説有我等可説如佛説有人自炙身等一切復次如佛説無聞無知凡夫以惡業為相聰明之人以善業為相是故諸部語不可依如是如諸部前所説有我無我直置問不記故如是我等今説問不相應故是故直置相應故不直置如佛記無知凡夫人不善聰明人善是故諸部語不可依如是如諸部前所説有我無我不可説定異故如是我等今説若我驗者應是行為異行如是正説為是行為異行應説是故應遣諸部語不可依如是如諸部前所説有我無我不可説常無常故如是我等今説若我有無中可説成斷見常見若依此二見佛所不許若言無人者成過不記之類此言不可何以故若言無人者是名邪見若言有人者是名正見是故有人可説如修多羅中説若言無人名為邪見若言有人名為我見若言有者是其常無常故若如此者行成常無常故若同有有者行無常無為常人不如是同有不同常無常應可知如是如諸部前所説有我無我不可説有無中依止故如是我等今説若都無我佛不應説有依止是佛説有依止故是故有我可説如是如諸部前所説有我語縛故如是我等今説無人可縛而有縛如王獄縛雖無人而有縛有結如有繩有結無繩無結如是無我而有語縛如是如諸部前所説有我正見故如是我等今説依有漏陰佛説有人以人見有人故名為正見如是如諸部前所説有我佛説四念故如是我等今説佛語迦旃延唯心而已欲顯身受心法故説唯心而已成諸法更無異如是如諸部前所説有我佛説聲聞故如是我等今説聲聞説處依止法聲聞説而已更無異如諸部前所説有我有説故如是我等今説佛説有人假名是故是其朋無我若實無我不成殺生殺者亦無所殺亦無偷盜邪淫妄語飲酒亦如是如是無我若無我者五逆亦無縱任諸根無起善惡者無縛無解縛者亦無所縛亦無作者亦無業亦無報若業無者果報亦無業果報無者亦無生死而衆生以業果報輪轉生死若無生死者生死因亦無若無因者因滅亦無若因滅無者趣道亦無如是四諦亦無若無四諦亦無佛説四諦若無佛者亦無有僧如是無人者三寶四諦亦無如是諸説並所不應以是故無人者成上諸過後過亦生若有人有我者上所説無過如佛説修多羅真應當知是故實有我如諸部前所説五陰是人是我界門故如是我等今説若人命我異是修多羅不顯有我為陰是我我是陰若陰是我陰可説我不可説若我是陰我可説陰不可説亦可兩可説非五陰是我如是如諸部前所説人異五陰如擔重擔人故如是我等今説依擔故説有擔若我異陰壞時起時我亦起亦滅如斫身一分我亦應一分如是一分成多分一分多分還成一隨身存時命亦隨存命存時身亦存是故陰即是我是語可遣如是如諸部前所説人異陰取愛為其二故如是我等今説若人正見無疑如人有愛繫縛輪轉生死佛欲顯示佛言人取愛為其第二長處生死愛斷時無復輪轉是故我不異陰如是如諸部前所説人與陰各受業果故如是我等今説依有漏生死此生來生受其果報是故人與陰不各復次如諸部前所説人與陰各是我説故如是我等今説依度説佛言我過去無數阿僧祇劫時曾為頂生王是故人與陰不各如是復次如諸部前所説人與陰各不記處説故如是我等今説陰我異不異不可説是故法相以常無常為首不可説我亦不可説若我異陰者佛言我異身異佛所不記修多羅所不明若我異陰者亦可在陰中亦可遍一切處若在陰中斫身時破身時我應可見如蚊在優曇婆羅果中破優曇婆羅果時蚊可見我在陰中亦復如是若我異身冷熱觸身我不應覺知復次若挑眼時倍應見物如是諸根壞時聲香味觸等亦應覺知如是復次若我異身從此身入彼身還來入身如人從此屋入彼屋還入此屋我異者應如是復次我異陰者我不應處處受生若處處受生應一念遍處受生是故不應常在身中故解脫難得若處處行不應作業若無業果亦無功業亦無縛解亦無行禪便應解脫如是等不應是故人異身語可遣如是
