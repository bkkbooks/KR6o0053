body:
  text: 失譯人名今附秦録如諸部前所説人是常無本故如是我等今説若無本成常生死無本亦應是常此言不應人無本不可説如是如諸部前所説人是常憶過去世故如是我等今説若我定異陰者陰壞時人不滅應憶過去世時事只應此人不應有異人而輪轉生死無斷絶時此語不應如是如諸部前所説人是常説處故如是我等今説斷苦流滅故至有餘涅槃故身猶存住名之度彼岸住婆羅門至無餘涅槃既至得無餘涅槃故是佛所説是故不説人常如是如諸部前所説人常到不動樂故如是我等今説得無餘涅槃時便至不動樂若人常者不生不死如涅槃不生不死身亦不異其智慧在所處處亦不異食不食苦樂無異常故過去時事不忘常故無變異亦無縛無解是故人常此語應遣如是如諸部前所説人無常有本故如是我等今説有漏起故是名説人以是故不可言陰與人異是故人起不可説以是假説即答解前次佛説新等故若人無常者衆生輪轉所作善惡業壞不作善惡業自來無先因故一切衆生悉應一種不造業應解脫者不由業自成既不由業自成功德無所為先世時生亦無可憶是故人無常此語應遣以是假説即答解前次倒法故落生故生老病死法人無常故如是問曰云何説有人答曰佛説有三種人問曰云何三種人答依説人度説人滅説人説者亦名安亦名制亦名假名問曰云何依説答如佛所説語跋婆耶言是是行所依説是是其名安是名依説如火譬如佛語舍利弗有人名象白淨可愛四大所成是名我如是一切亦如乳譬如是依修多羅等所説是名依説如色得色人得色人不可説異色色不可説異得色人依色得名依色人若人説是色是我是其色成名我見若人説色是我者以是過五陰人前所説成是其過復言若人説得色人異色者名異我見若人説異我以是過人異五陰成是其過得色人相從而已非是真説若人説色得色人相從而已成其邪見若邪見者言無我以是過前所説成是其過以是故此是三過是故實異邪見不隨實異不隨邪見依色得色人可説以是故得色人共色實可説是故是時色起是時得色人亦起是時色滅是時得色人亦滅不是不可説如是五陰十二門五道阿修羅道中陰為七道人生有處迦羅羅阿浮陀那肉團支新生童子年少中年老善惡記心戒犯戒如是上一切合不合依上諸法是名依説人可知問曰云何度説人答曰以是時度異有是時佛説度衆生云何度説衆生過去説未來説現在説云何過去説如天使修多羅所説上啓閻羅此人先不知父母兄弟等不知功德不知善惡等願教其如是如佛所説我過去世時曾作頂生王是名過去説云何未來説如佛所説轉輪聖王在中有時初入母腹如入堂殿如是如佛語彌勒阿逸多汝後成佛時名曰慈氏是名未來説如是云何現在説答曰如佛説安伽人有耳璫種種寶飾臂手如是如佛所説大富長者多有財寶大如意如是是名現在説佛依三世行制三説如是應知以是行度説是名度説云何滅説答逐依説人度説人佛説滅説人如過去身壞時是名滅説如是如佛所説漏盡比丘五陰無常滅是名滅説如佛説偈言智者莫能測得至無動樂是名滅説如是見依説度説是故説有人捨五陰生有處受五陰中間有如是見滅説佛説無復有受陰處如是問曰為捨五陰滅盡猶有所餘答曰何所疑曰見先師意互相違故生疑有諸部見五陰一邊從此有往彼有如是何以故識上生故佛言是人識戒熏定熏是其識上生勝處佛復説偈言善惡二種業是業人世造是業是其物自捉自隨去麁陰是惡業細陰是善行善惡二俱造隨捉逐業往是人往生其受根義是以故其度天眼人見其度如佛語比丘我見衆生落生如是一切是故諸部見五陰一邊從此有往彼有如是又諸部説人如是從此有往彼有非是陰何以故佛説偈故佛説偈言生世樂歡喜異世樂欣然作福二處歡自見其淨業護根往善道不護墮惡道佛復説言此死落生如是是故如諸部見人如是從此有往彼有非陰如是又諸部説無人從此有度彼有何以故如佛言新天人人見如是佛復説言是是行行所依是是受其名如火依薪受其名如是佛復説一切德人生世間多人受安樂如是前世已生不復更生是故無人捨此度彼有是故生疑曰前所問為捨五陰滅盡猶有所餘今若捨五陰五陰無遺餘從此有度彼有如佛説偈言棄捨此人形受天身具足如佛説人無財寶一切捨隨所往如是如佛説臨死時捨其身獨自去在世之時言皆是我有臨死之時一切捨獨自去戒定熏心藉此善業上生是故佛説善心而已上生勝處是故捨五陰滅盡往彼勝處依業不滅佛説偈言是業是其物自捉自隨去中陰根故往生彼處受根義行中陰處天眼見中陰色如諸部説五陰一邊從此有往彼有是故捨此語如是前所説如是人從此有往彼有唯人而已若爾者應至道實異無往若實異若常若不常成邪見如前所説實異常不常成邪見遮以是故人共陰實異不可説是故是人而已往生處不可説如是問曰云何人身滅時五中有起答曰人欲滅時中有起時依五中有是名五中有人可説逐過去説依度説人可説以是故不依人是故不依義不是人可説如是見法念滅念滅不滅行念念是名佛説應當知以是故捨五陰身都盡人從此有度彼有是故説有人捨五陰生有處受五陰中間有如是問曰為前受五中陰處後捨人五陰答曰不如若如所問生成有間若生成有間者聖人滅應更受有不成滅四取若陰與人別是所不應如是問曰為先捨人五陰受五中陰身答曰不如若如所問一人一念中便應成兩種有是所不應如是問曰今者云何捨人身受五中陰身為一時而受為不一時答曰是一時問曰云何答曰人臨死時最後一念心現起時中陰心未起最後一念心滅時中陰心方起中陰心起時成五中有人是故説捨人陰受中有何以故中陰心起時成從人中落中間有處成時心住是處時是名落生是故相應時應當知有人捨五陰生有處受五陰中間有如是一切曰當説我今問曰陰有源本不而從陰次第生至今為有本為無本如是曰何所疑答曰佛語比丘生死無本衆生輪轉生死源本不可知如是為無實故不可知為有實故不可知如十二門説有十三門實無故不可知為無智不可知何以故無色界人餘二界人無智故不知如世界成不成直置不可答有展轉源本是初有可説是故我等生疑問曰人前生源本不可知為實有為實無若有知見可説答曰實有不可知何以故譬如實有物覆故不可知亦如一毫微塵細故不可知又如地曠故不可知亦如眼皮極近眼故不可知又如海岸極遠故不可知復如眼根弱故不可知如髮毫端亦如芥子聚以一芥子投聚中色相似故不可知又如恆河流水以一把鹽投河中淡水力多故鹽不可得亦如寶物在壁內隔障故不可見亦如鬼神隱形故不可見如無知人不知命所餘故不可知如寶物在壁障隔等實有不可知如是人源本實有不可知如是難曰從此源本若塵及毫端等實有不可知者餘人見如天眼見毫端又如地曠邊際唯天眼者見復如眼皮自不見近其者見如海岸不可知渡到者見如髮毫端明眼者見以一芥子投芥聚中明眼者見恆河水以一把鹽投之唯魚近其邊知覆障財寶天眼者見隱形鬼神唯同類見有方術人見餘命不可知他心智人見如是上所説一切有言不可見不可知然一切可知可見源本無人知是故如覆障寶物等實有不可知非因復説實有不可知何以故無能測量故如雪山實有不可稱量何以故無能測量故難曰若為知雪山稱量實有不可知答曰見雪山石有量數挍略雪山稱量實有可知是故無能測量不可知難曰若挍略可知此非知但挍略知非稱量實知便成無明又問曰不實故稱量不可知答曰不實不可知何以故如修多羅中所説故佛言物不實處無知聲如佛語比丘如酥油燈滅其灰其墨不可知如是須彌大海大地劫盡火劫起時一切燒蕩盡其塵其墨不可知如是佛言源本不可知亦復如是如酥油燈滅其墨塵不實有不可知如是源本不可知亦復如是問曰如實物有處佛説不可知聲答如律中所説若人酒著手若器此人以手捧器奉上比丘盛食比丘不知得食無罪如是是故此非因又説不實不可知若源本實有者佛實智應從彼起不應説言不可知以佛説不可知故是源本不實有答曰此義處不爾佛實智不從彼起如世間問常無常等處佛不答是故無因復説不爾故源本不可知佛説不可知若佛直説無源本成斷見若佛説有源本復成常見此二種語不應是不應故佛説不可知如是問曰若生死有本者成常見若無本者成斷見聖人生死本已盡別本更起應知而不爾別本更起者便成斷見生死源本不實有不可知何以故生死輪轉無窮故佛語諸比丘有依愛本不可知從此起愛謝在過去從此起愛未來當起如是一切以是故無有愛本是故生死無實本不可知復次生死常起故若無生死亦無涅槃如佛語阿難有漏五陰滅盡時是名滅是名涅槃佛又語阿難涅槃雖滅盡不無本以是故生死滅有本是故生死本不實有本不可知如是復次因展轉合故一切人不以我為因本若以我為因本生死不盡是故無本如是復次憶知過去無數世界如佛所説過去時若欲知法識隨起知以是故識無數故境界亦無數應知亦無數是故生死無本如是復次生死無本故若生死有本者過去生本亦應有是故不實有過去生本不可知如是復次有愛展轉故佛説過去生本不可知若生死本無者亦無其名若無法不應有名如是答曰無法無名無名名不實雖無名以無名便是其名是故有名故是其不實如所説過去源本名實故源本應實此語不是曰不爾如所説無法有名故有實者有法有名亦應無名不實何以故無名故若爾無法不實其名亦不實實有法其名亦實有是故無法之名亦不實以是故源生不實有驗矣難曰若爾實不實便是不定不實成實實成不實是所不應復次有法遮言無有法無法始顯勝降實不實可見以是處無遮言有是名實如打物發此聲此聲無本故如是源生可説如兔角是故生死是源本難曰若生死無本者亦無其末如是無本無末與涅槃無異是所不應如是答曰是實無本五陰展轉相生故是故無常因展轉果亦展轉問曰若生死無本者中末亦無中末無者生死亦無如林無本無末亦無中便無此林如是無生死如是答曰不爾何以故如團圓物無本中末不無圓物生死亦爾難曰若團圓物無本中末而有者無第二未可壞生死亦爾答曰恐如是生死不滅如所執本無故一切法無此是下執以前生因展轉故是故無本因壞故生死盡生死壞因亦盡如是前憶過去無數世界故是故佛説無源本若生死源本陰展轉無本故成常見依陰依度佛説有衆生如是説曰陰展轉無本者衆生展轉亦無本衆生不應展轉何以故佛已説生死無本故問曰若生死無本佛何故説不可知何不直言無答曰若佛直説無者不應起三種邪見三種邪見者第一我前身曾生不第二我後更生不第三我今若為生不應生疑以是故佛説不可知是故佛説應當知如是佛説法有二種何者二種一為法二為衆生云何為法如佛所説源生不可知有愛本不可知為法故説無生死源本可説云何為衆生無明覆衆生輪轉生死為衆生故説法衆生輪轉生死是故佛為説説曰如是時法至其心依度是時佛説是衆生問曰何故佛説有法源生不可知答曰佛不應為衆生説無源本難曰如是時法依度是時佛説是衆生爾時法無常可説不應説衆生常無常如是源生可説不可説可知生死無本驗矣
